<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Réservez votre table à Hotelintsika - Profitez d'une expérience culinaire unique à Madagascar.">
    <title>Réservation - Hotelintsika</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="homepage.html" class="navbar-brand">
            <div class="navbar-logo">H</div>
            Hotelintsika<span>.</span>
        </a>
        <ul class="navbar-links" id="navLinks">
            <li><a href="homepage.html">Accueil</a></li>
            <li><a href="A-propos.html">À propos</a></li>
            <li><a href="Menu.html">Menu</a></li>
            <li><a href="reservation.html" class="active">Réservation</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="navbar-actions">
            <button class="cart-btn" onclick="toggleCart()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <div class="page-hero-content">
                <div class="breadcrumb">
                    <a href="homepage.html">Accueil</a>
                    <span>›</span>
                    <span>Réservation</span>
                </div>
                <h1>Réserver une <span>Table</span></h1>
                <p>Planifiez votre visite et garantissez-vous la meilleure table pour vos repas.</p>
            </div>
        </div>
    </section>

    <section class="reservation-section" style="padding: 4rem 0;">
        <div class="container">
            <div style="max-width: 800px; margin: 0 auto; background: var(--surface); padding: 3rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08);">
                <form id="reservationForm" onsubmit="submitReservation(event)">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--secondary);">Nom complet</label>
                            <input type="text" placeholder="Ex: Jean Rakoto" required style="width: 100%; padding: 0.9rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--secondary);">Numéro de téléphone</label>
                            <input type="tel" placeholder="034 12 345 67" required style="width: 100%; padding: 0.9rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--secondary);">Date</label>
                            <input type="date" required style="width: 100%; padding: 0.9rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--secondary);">Heure</label>
                            <input type="time" required style="width: 100%; padding: 0.9rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--secondary);">Nombre de personnes</label>
                            <input type="number" min="1" max="20" value="2" required style="width: 100%; padding: 0.9rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--secondary);">Sélectionner une Table</label>
                        <select required style="width: 100%; padding: 0.9rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; background-color: #fff; cursor: pointer;">
                            <option value="" disabled selected>Choisir le numéro et le nom de la table</option>
                            <option value="T01-BAOBAB">Table 01 - Baobab</option>
                            <option value="T02-RAVINALA">Table 02 - Ravinala</option>
                            <option value="T03-NOSYBE">Table 03 - Nosy Be</option>
                            <option value="T04-ANTSIRABE">Table 04 - Antsirabe</option>
                            <option value="T05-ISALO">Table 05 - Isalo</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 2.5rem;">
                        <label style="display: block; margin-bottom: 1rem; font-weight: 600; color: var(--secondary);">Moyen de paiement (Mobile Money)</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                            <label style="cursor: pointer; position: relative;">
                                <input type="radio" name="payment_method" value="mvola" required style="position: absolute; opacity: 0;">
                                <div class="payment-card" style="padding: 1.2rem; border: 2px solid var(--border); border-radius: 12px; text-align: center; transition: all 0.3s;">
                                    <span style="display: block; font-weight: 700; color: #ff6b00;">Mvola</span>
                                </div>
                            </label>
                            <label style="cursor: pointer; position: relative;">
                                <input type="radio" name="payment_method" value="orange" style="position: absolute; opacity: 0;">
                                <div class="payment-card" style="padding: 1.2rem; border: 2px solid var(--border); border-radius: 12px; text-align: center; transition: all 0.3s;">
                                    <span style="display: block; font-weight: 700; color: #ff6600;">Orange Money</span>
                                </div>
                            </label>
                            <label style="cursor: pointer; position: relative;">
                                <input type="radio" name="payment_method" value="airtel" style="position: absolute; opacity: 0;">
                                <div class="payment-card" style="padding: 1.2rem; border: 2px solid var(--border); border-radius: 12px; text-align: center; transition: all 0.3s;">
                                    <span style="display: block; font-weight: 700; color: #c41e3a;">Airtel Money</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 12px;">Réserver maintenant</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="text-align: center; padding: 2rem 0; border-top: 1px solid var(--border);">
                <p>&copy; 2026 Hotelintsika. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
